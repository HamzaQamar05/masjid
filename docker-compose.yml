services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.mujtamaconnect.com}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-https://mujtamaconnect.com}
      APP_URL: ${APP_URL:-https://mujtamaconnect.com}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.mujtamaconnect.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mujtamaconnect.com,https://www.mujtamaconnect.com,capacitor://localhost,http://localhost}
    depends_on:
      - redis
    ports:
      - "5000:5000"
    volumes:
      - media-uploads:/app/uploads

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  media-uploads:
