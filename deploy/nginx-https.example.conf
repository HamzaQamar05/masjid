server {
  listen 80;
  server_name mujtamaconnect.com www.mujtamaconnect.com api.mujtamaconnect.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name www.mujtamaconnect.com;

  ssl_certificate /etc/letsencrypt/live/mujtamaconnect.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mujtamaconnect.com/privkey.pem;

  return 301 https://mujtamaconnect.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.mujtamaconnect.com;

  ssl_certificate /etc/letsencrypt/live/mujtamaconnect.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mujtamaconnect.com/privkey.pem;

  location /api/ {
    proxy_pass http://127.0.0.1:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://127.0.0.1:5000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name mujtamaconnect.com;

  ssl_certificate /etc/letsencrypt/live/mujtamaconnect.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mujtamaconnect.com/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
