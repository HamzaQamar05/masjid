name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DATABASE_URL,JWT_SECRET,FRONTEND_URL,PUBLIC_API_URL,CORS_ALLOWED_ORIGINS,OPENAI_API_KEY,OPENAI_MODEL,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT
          script: |
            set -e
            cd /opt/masjid
            FRONTEND_URL="${FRONTEND_URL:-https://mujtamaconnect.com}"
            if echo "$FRONTEND_URL" | grep -qi 'vercel.app'; then
              FRONTEND_URL="https://mujtamaconnect.com"
            fi
            APP_URL="${APP_URL:-$FRONTEND_URL}"
            PUBLIC_API_URL="${PUBLIC_API_URL:-https://api.mujtamaconnect.com}"
            if echo "$PUBLIC_API_URL" | grep -qi 'vercel.app'; then
              PUBLIC_API_URL="https://api.mujtamaconnect.com"
            fi
            CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS:-$FRONTEND_URL,https://www.mujtamaconnect.com,capacitor://localhost,http://localhost}"
            VAPID_SUBJECT="${VAPID_SUBJECT:-$FRONTEND_URL}"
            VITE_API_URL="${VITE_API_URL:-$PUBLIC_API_URL}"
            export FRONTEND_URL APP_URL PUBLIC_API_URL CORS_ALLOWED_ORIGINS VAPID_SUBJECT VITE_API_URL
            mkdir -p env-backups
            if [ -f backend/.env ]; then
              backup_path="env-backups/backend.env.$(date -u +%Y%m%d-%H%M%S)"
              cp backend/.env "$backup_path"
              chmod 600 "$backup_path"
              cp backend/.env /tmp/masjid-backend.env
            fi
            git fetch origin
            git reset --hard origin/main
            mkdir -p backend
            if [ -f /tmp/masjid-backend.env ]; then
              cp /tmp/masjid-backend.env backend/.env
              chmod 600 backend/.env
            else
              deleted_env_commit="$(git log --diff-filter=D --format=%H -- backend/.env | head -n 1 || true)"
              if [ -n "$deleted_env_commit" ] && git show "${deleted_env_commit}^:backend/.env" >/tmp/masjid-recovered-backend.env 2>/dev/null; then
                grep -v '^WHATSAPP_' /tmp/masjid-recovered-backend.env > backend/.env
                if ! grep -q '^OPENAI_API_KEY=' backend/.env; then
                  printf 'OPENAI_API_KEY=%s\n' "${OPENAI_API_KEY:-}" >> backend/.env
                fi
                if ! grep -q '^OPENAI_MODEL=' backend/.env; then
                  printf 'OPENAI_MODEL=%s\n' "${OPENAI_MODEL:-gpt-4o-mini}" >> backend/.env
                fi
                chmod 600 backend/.env
                cp backend/.env "env-backups/backend.env.recovered.$(date -u +%Y%m%d-%H%M%S)"
                chmod 600 env-backups/backend.env.recovered.*
                echo "Recovered backend/.env from previous Git history. Rotate exposed keys after deploy."
              else
                required_env() {
                  name="$1"
                  eval "value=\${$name:-}"
                  if [ -z "$value" ]; then
                    echo "Missing required GitHub secret: $name" >&2
                    exit 1
                  fi
                }
                required_env DATABASE_URL
                required_env JWT_SECRET
                required_env FRONTEND_URL
                required_env OPENAI_API_KEY
                required_env VAPID_PUBLIC_KEY
                required_env VAPID_PRIVATE_KEY
                {
                  printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
                  printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
                  printf 'PORT=5000\n'
                  printf 'FRONTEND_URL=%s\n' "$FRONTEND_URL"
                  printf 'APP_URL=%s\n' "$FRONTEND_URL"
                  printf 'PUBLIC_API_URL=%s\n' "${PUBLIC_API_URL:-$FRONTEND_URL}"
                  printf 'UPLOADS_DIR=/app/uploads\n'
                  printf 'MUSLIM_SALAT_API_KEY=\n'
                  printf 'CORS_ALLOWED_ORIGINS=%s\n' "${CORS_ALLOWED_ORIGINS:-$FRONTEND_URL}"
                  printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
                  printf 'OPENAI_MODEL=%s\n' "${OPENAI_MODEL:-gpt-4o-mini}"
                  printf 'VAPID_PUBLIC_KEY=%s\n' "$VAPID_PUBLIC_KEY"
                  printf 'VAPID_PRIVATE_KEY=%s\n' "$VAPID_PRIVATE_KEY"
                  printf 'VAPID_SUBJECT=%s\n' "${VAPID_SUBJECT:-$FRONTEND_URL}"
                  printf 'PRAYER_NOTIFICATION_JOB_ENABLED=true\n'
                } > backend/.env
                chmod 600 backend/.env
              fi
            fi
            docker compose build
            docker compose run --rm --no-deps \
              -e PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=1 \
              backend npm run migrate:deploy
            docker compose up -d --remove-orphans
            docker compose ps
            backend_ready=0
            for attempt in $(seq 1 30); do
              if curl --fail --silent http://127.0.0.1:5000/api/health >/dev/null; then
                backend_ready=1
                break
              fi
              sleep 2
            done
            if [ "$backend_ready" -ne 1 ]; then
              docker compose logs --tail=100 backend
              exit 1
            fi
            curl --fail --silent http://127.0.0.1:8080/ >/dev/null
            exit 0
