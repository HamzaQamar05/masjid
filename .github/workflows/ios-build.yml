name: iOS Build Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - run: npx cap sync ios

      - name: Check iOS files
        run: ls -la ios/App

      - name: Build iOS
        run: |
          if [ -f ios/App/App.xcworkspace ]; then
            xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator build
          else
            xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator build
          fi
